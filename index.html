<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentalSphere Knowledge Base</title>
<style>
:root{
  --accent:#E8631A;--accent-soft:#fff4ee;--accent-border:#fdd0b5;
  --secondary:#2e7d32;--secondary-soft:#e8f5e9;--secondary-border:#c8e6c9;
  --head:#1a1a2e;--head-2:#17172a;--bar:#252540;--bg:#f4f2ef;
  --card:#fff;--border:#e0d6cc;--text:#1e1e1e;--muted:#666;
  --radius:10px;--shadow:0 2px 10px rgba(0,0,0,.07);--shadow-hover:0 5px 22px rgba(0,0,0,.13);
  --content-max:none;
}
:root[data-theme="trainingclub"]{
  --accent:#ff8a2a;--accent-soft:#fff3e8;--accent-border:#ffd3a8;
  --secondary:#12b7d8;--secondary-soft:#e9fbff;--secondary-border:#b8eef8;
  --head:#053b66;--head-2:#032f52;--bar:#0a4977;--bg:#f6f9fc;
  --card:#fff;--border:#d7e6f0;--text:#09233c;--muted:#6d8294;
  --radius:14px;--shadow:0 4px 16px rgba(5,59,102,.08);--shadow-hover:0 8px 28px rgba(5,59,102,.16);
}
:root[data-width="contained"]{--content-max:980px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;overflow-x:hidden}
body{font-family:'Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:linear-gradient(135deg,var(--head),var(--head-2));padding:20px 34px;border-bottom:1px solid rgba(255,255,255,.08)}
.hdr-logo{font-size:1.34rem;font-weight:800;color:#fff;letter-spacing:-.4px;line-height:1.2}
.hdr-logo span{color:var(--accent)}
.hdr-sub{font-size:.78rem;color:rgba(255,255,255,.62);margin-top:4px}
.strip{background:var(--bar);padding:22px 34px 18px;border-bottom:4px solid var(--accent)}
.sw{width:100%;max-width:var(--content-max);margin:0 auto}
.sbox{display:flex;border-radius:var(--radius);overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.18);margin-bottom:14px;border:1px solid rgba(255,255,255,.12)}
.sico{background:#fff;display:flex;align-items:center;padding:0 13px;color:#8aa2b5;font-size:1.05rem}
#si{flex:1;border:none;outline:none;padding:14px 15px 14px 3px;font-size:1rem;color:var(--text);background:#fff}
#si::placeholder{color:#a9b7c4}
.filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.fl{color:rgba(255,255,255,.6);font-size:.76rem;margin-right:2px}
.chip{padding:6px 14px;border-radius:999px;border:1.5px solid rgba(255,255,255,.22);background:rgba(255,255,255,.04);color:rgba(255,255,255,.78);font-size:.76rem;cursor:pointer;transition:all .14s;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:#fff}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:800;box-shadow:0 4px 14px rgba(232,99,26,.25)}
.lsel{padding:6px 32px 6px 12px;border-radius:999px;border:1.5px solid rgba(255,255,255,.22);background:rgba(255,255,255,.04);color:rgba(255,255,255,.78);font-size:.76rem;cursor:pointer;min-width:260px;max-width:100%}
.lsel option{background:var(--bar);color:#fff}
.lsel:focus{outline:none;border-color:var(--accent)}
.rw{width:100%;max-width:var(--content-max);margin:0 auto;padding:24px 34px 58px}
.rmeta{font-size:.8rem;color:var(--muted);margin-bottom:14px}
.rmeta strong{color:var(--accent)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px 18px;margin-bottom:14px;border-left:5px solid transparent;border-top:1px solid rgba(5,59,102,.04);border-right:1px solid rgba(5,59,102,.04);border-bottom:1px solid rgba(5,59,102,.04);cursor:pointer;transition:box-shadow .14s,transform .11s}
.card:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px)}
.card.ep{border-left-color:var(--accent)}
.card.blog{border-left-color:var(--secondary)}
.ctop{display:flex;gap:10px;align-items:flex-start;margin-bottom:5px}
.badge{font-size:.65rem;font-weight:800;padding:4px 9px;border-radius:999px;white-space:nowrap;flex-shrink:0;margin-top:2px;text-transform:uppercase;letter-spacing:.45px}
.bric{background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-border)}
.bblog{background:var(--secondary-soft);color:var(--secondary);border:1px solid var(--secondary-border)}
.ctitle{font-size:1.02rem;font-weight:800;color:var(--head);line-height:1.35;flex:1}
.csub{font-size:.78rem;color:var(--muted);margin-bottom:3px}
.cmeta{font-size:.72rem;color:#8a9aaa;margin-bottom:8px}
.csum{font-size:.86rem;color:#334;line-height:1.58;margin-bottom:8px}
.nugs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.nug{font-size:.7rem;background:var(--accent-soft);border:1px solid var(--accent-border);color:#b84a00;padding:3px 8px;border-radius:999px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tag{font-size:.69rem;background:var(--bg);border:1px solid var(--border);color:#526475;padding:3px 7px;border-radius:8px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tleg{background:#f0f7ff;border-color:#c3daef;color:#1c5c91}
.cft{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.clink{font-size:.78rem;font-weight:800;color:var(--accent);text-decoration:none}
.clink:hover{text-decoration:underline}
.cnote{font-size:.7rem;color:#8a9aaa}
.cnote a{color:var(--accent);text-decoration:none}
.cnote a:hover{text-decoration:underline}
.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.empty h3{font-size:1.1rem;margin-bottom:7px;color:var(--head)}
.footer{background:var(--head);color:rgba(255,255,255,.48);text-align:center;padding:17px;font-size:.74rem}
.footer a{color:var(--accent);text-decoration:none}
mark{background:#fff3cd;color:inherit;border-radius:3px;padding:0 2px}
.loading{text-align:center;padding:70px 20px;color:var(--muted)}
.error{background:#fff3f3;border:1px solid #f0b4b4;color:#8a1f1f;border-radius:var(--radius);padding:18px;margin-bottom:15px}
@media(max-width:700px){
  .hdr,.strip{padding-left:18px;padding-right:18px}
  .rw{padding:18px 14px 44px}
  .ctop{flex-direction:column;gap:5px}
  .card{padding:16px 16px 14px}
  .lsel{width:100%;min-width:0}
}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-logo" id="brandTitle">Rental<span>Sphere</span> Knowledge Base</div>
    <div class="hdr-sub" id="sub">Loading searchable archive…</div>
  </div>
</div>
<div class="strip">
  <div class="sw">
    <div class="sbox">
      <div class="sico">🔍</div>
      <input type="text" id="si" placeholder="Search topics, legislation, problems, keywords…" autocomplete="off" spellcheck="false">
    </div>
    <div class="filters">
      <span class="fl">Show:</span>
      <button class="chip on" data-t="all" id="chipAll">All</button>
      <button class="chip" data-t="episode" id="chipEpisode">🎓 Inner Circle</button>
      <button class="chip" data-t="blog" id="chipBlog">📝 Blog</button>
      <span class="fl" style="margin-left:5px">Legislation:</span>
      <select class="lsel" id="lf"><option value="">Any legislation</option></select>
    </div>
  </div>
</div>
<div class="rw">
  <div class="rmeta">Showing <strong id="cnt">0</strong> resources</div>
  <div id="res"><div class="loading">Loading archive…</div></div>
</div>
<div class="footer">
  <span id="footerBrand">RentalSphere Knowledge Base</span> &nbsp;|&nbsp;
  <a href="https://rentalsphere.co.za/ric" target="_blank" rel="noopener">Join the Inner Circle</a> &nbsp;|&nbsp;
  <a href="https://rentalsphere.co.za" target="_blank" rel="noopener">rentalsphere.co.za</a>
</div>
<script>
const params=new URLSearchParams(location.search);
let theme=(params.get('theme')||params.get('brand')||'rentalsphere').toLowerCase().replace(/[^a-z0-9]/g,'');
if(['rtc','training','trainingclub','rentaltrainingclub','rentaltraining'].includes(theme)) theme='trainingclub'; else theme='rentalsphere';
document.documentElement.dataset.theme=theme;
if((params.get('width')||'full').toLowerCase()==='contained') document.documentElement.dataset.width='contained';
const BRAND={
  rentalsphere:{title:'Rental<span>Sphere</span> Knowledge Base',footer:'RentalSphere Knowledge Base'},
  trainingclub:{title:'Rental <span>Training Club</span> Knowledge Base',footer:'Rental Training Club Knowledge Base'}
};
document.getElementById('brandTitle').innerHTML=BRAND[theme].title;
document.getElementById('footerBrand').textContent=BRAND[theme].footer;
let D=[],aT='all',aL='',aQ='';
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function safeUrl(url){try{const u=new URL(url,location.href);return ['http:','https:'].includes(u.protocol)?u.href:'#'}catch(e){return '#'}}
function searchText(e){return String(e.s||[e.title,e.subtitle,e.meta,e.summary,...(e.topics||[]),...(e.leg||[])].join(' ')).toLowerCase()}
function hl(t,q){if(!q||!t)return x(t);let o=x(t);q.trim().split(/\s+/).filter(Boolean).forEach(term=>{const re=new RegExp('('+term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');o=o.replace(re,'<mark>$1</mark>')});return o}
function updateCounts(){
  const total=D.length,episodes=D.filter(e=>e.type==='episode').length,blogs=D.filter(e=>e.type==='blog').length;
  document.getElementById('sub').textContent=`Search ${episodes} Inner Circle episodes & ${blogs} blog articles`;
  document.getElementById('chipAll').textContent=`All (${total})`;
  document.getElementById('chipEpisode').textContent=`🎓 Inner Circle (${episodes})`;
  document.getElementById('chipBlog').textContent=`📝 Blog (${blogs})`;
}
function populateLegislation(){
  const select=document.getElementById('lf');
  select.innerHTML='<option value="">Any legislation</option>';
  [...new Set(D.flatMap(e=>Array.isArray(e.leg)?e.leg:[]))].filter(Boolean).sort((a,b)=>a.localeCompare(b)).forEach(item=>{
    const opt=document.createElement('option');opt.value=item;opt.textContent=item;select.appendChild(opt);
  });
}
function render(){
  const q=aQ.trim().toLowerCase(),terms=q?q.split(/\s+/).filter(Boolean):[];
  let list=D.filter(e=>{
    if(aT!=='all'&&e.type!==aT)return false;
    if(aL&&!(Array.isArray(e.leg)&&e.leg.includes(aL)))return false;
    if(terms.length)return terms.every(t=>searchText(e).includes(t));
    return true;
  });
  if(q)list.sort((a,b)=>(String(a.title||'').toLowerCase().includes(q)?0:1)-(String(b.title||'').toLowerCase().includes(q)?0:1));
  document.getElementById('cnt').textContent=list.length;
  const el=document.getElementById('res');
  if(!list.length){el.innerHTML='<div class="empty"><h3>No results found</h3><p>Try different keywords or clear the filters.</p></div>';return}
  el.innerHTML=list.map(e=>{
    const url=safeUrl(e.url||'https://rentalsphere.co.za/ric');
    const nugH=(e.nuggets||[]).length?'<div class="nugs">'+e.nuggets.map(n=>`<span class="nug">${x(n)}</span>`).join('')+'</div>':'';
    const tagH='<div class="tags">'+(e.leg||[]).slice(0,3).map(l=>`<span class="tag tleg">⚖️ ${x(l)}</span>`).join('')+(e.topics||[]).slice(0,4).map(t=>`<span class="tag">${x(t)}</span>`).join('')+'</div>';
    const ftH=e.member?`<div class="cft"><a class="clink" href="https://rentalsphere.co.za/ric" target="_blank" rel="noopener" onclick="event.stopPropagation()">View in Inner Circle →</a><span class="cnote">🔒 Members only — <a href="https://rentalsphere.co.za/ric-plans/" target="_blank" rel="noopener" onclick="event.stopPropagation()">join here</a></span></div>`:`<div class="cft"><a class="clink" href="${x(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Read article →</a></div>`;
    return `<div class="card ${e.type==='episode'?'ep':'blog'}" data-url="${x(url)}" role="link" tabindex="0"><div class="ctop"><span class="badge ${e.type==='episode'?'bric':'bblog'}">${x(e.badge||'')}</span><div class="ctitle">${hl(e.title,aQ)}</div></div><div class="csub">${x(e.subtitle)}</div>${e.meta?`<div class="cmeta">${x(e.meta)}</div>`:''}${nugH}<div class="csum">${hl(e.summary,aQ)}</div>${tagH}${ftH}</div>`;
  }).join('');
  el.querySelectorAll('.card').forEach(card=>{card.addEventListener('click',()=>window.open(card.dataset.url,'_blank','noopener'));card.addEventListener('keydown',e=>{if(e.key==='Enter')window.open(card.dataset.url,'_blank','noopener')})});
}
async function loadArchive(){
  const el=document.getElementById('res');
  try{const r=await fetch('./data/archive.json?v='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('Could not load archive.json');D=await r.json();updateCounts();populateLegislation();render()}catch(err){el.innerHTML='<div class="error"><strong>Archive could not be loaded.</strong><br>Check that <code>data/archive.json</code> exists in the GitHub repo and GitHub Pages is enabled.</div>';console.error(err)}
}
let tmr;document.getElementById('si').addEventListener('input',e=>{clearTimeout(tmr);tmr=setTimeout(()=>{aQ=e.target.value;render()},160)});
document.querySelectorAll('.chip').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));b.classList.add('on');aT=b.dataset.t;render()}));
document.getElementById('lf').addEventListener('change',e=>{aL=e.target.value;render()});
loadArchive();
</script>
</body>
</html>
